<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גרעיני עפולה חממה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#111;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:#1e1e1e;border:1px solid rgba(201,168,76,0.35);border-radius:18px;padding:40px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
.emoji{font-size:48px;margin-bottom:12px}
h1{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.sub{font-size:14px;color:#c9a84c;margin-bottom:28px;letter-spacing:0.5px}
.msg{font-size:15px;color:#aaa;line-height:1.7;margin-bottom:28px}
.btn{display:inline-block;padding:14px 32px;font-size:16px;font-weight:700;background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#111;border:none;border-radius:12px;cursor:pointer;text-decoration:none}
.btn:active{opacity:0.85}
</style>
</head>
<body>
<div class="box">
  <div class="emoji">🌾</div>
  <h1>גרעיני עפולה חממה</h1>
  <div class="sub">מרכז ההזמנות עבר לממשק החדש</div>
  <div class="msg">הדף הזה אינו פעיל יותר.<br>כל ההזמנות והניהול עברו למרכז הניהול החדש.</div>
  <a class="btn" href="https://admin.hamamaltd.com">כניסה למרכז הניהול →</a>
</div>
</body>
</html>
