<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שיבוץ משמרות — גרעיני עפולה חממה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --black:#111;--black2:#1a1a1a;--card:#1e1e1e;
  --gold:#c9a84c;--gold2:#e8c96a;
  --gold-dim:rgba(201,168,76,0.15);--gold-border:rgba(201,168,76,0.35);
  --text:#f0f0f0;--muted:#888;--border:#2e2e2e;--dark2:#2a2a2a;--border2:#3a3a3a;
  --morning:#3d8ef0;--evening:#9b59b6;--double:#e74c3c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:var(--black);color:var(--text);min-height:100vh;}

header{background:linear-gradient(135deg,#222218,#1a1a14);border-bottom:2px solid var(--gold-border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo h1{font-size:16px;font-weight:800;color:var(--gold);}
.logo p{font-size:10px;color:var(--muted);}

.action-bar{background:var(--black2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;overflow-x:auto;}
.abt{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:12px;font-weight:700;font-family:'Heebo',sans-serif;cursor:pointer;transition:.2s;white-space:nowrap;}
.abt:hover{border-color:var(--gold-border);color:var(--gold);}
.abt.gold{background:var(--gold);color:#000;border-color:var(--gold);}

.branch-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:6px;overflow-x:auto;}
.bb{background:var(--black2);border:1px solid var(--border);border-radius:16px;padding:5px 12px;color:var(--muted);font-size:11px;font-family:'Heebo',sans-serif;cursor:pointer;transition:.2s;white-space:nowrap;}
.bb.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);font-weight:700;}

.info-bar{background:var(--black2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:11px;}
.ii{color:var(--muted);}.ii strong{color:var(--gold);}
.deadline{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);border-radius:5px;padding:3px 8px;font-size:11px;color:#e74c3c;font-weight:700;}
.legend{display:flex;gap:8px;margin-right:auto;}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ld{width:7px;height:7px;border-radius:50%;}

.main{padding:12px 16px;display:flex;flex-direction:column;gap:14px;}
.sec-box{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.sec-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sec-head h3{font-size:12px;font-weight:700;color:var(--gold);}
.sec-head span{font-size:10px;color:var(--muted);}
.tscroll{overflow-x:auto;}

table{width:100%;border-collapse:collapse;min-width:620px;table-layout:fixed;}
thead th{background:var(--black2);padding:8px;font-size:10px;font-weight:700;color:var(--muted);text-align:center;border-bottom:1px solid var(--border);}
thead th:first-child{text-align:right;min-width:70px;width:70px;}
.th-day{font-weight:700;color:var(--text);font-size:11px;}
.th-date{font-size:9px;color:var(--muted);margin-top:1px;}
tbody td{padding:4px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);vertical-align:top;}
tbody td:first-child{background:var(--black2);font-size:10px;font-weight:700;color:var(--muted);padding:8px 10px;white-space:nowrap;}
.row-m td:first-child{border-right:3px solid var(--morning);}
.row-e td:first-child{border-right:3px solid var(--evening);}
tbody tr:last-child td{border-bottom:none;}

.av-cell{min-height:168px;padding:3px;display:flex;flex-direction:column;gap:2px;}
.av-chip{display:flex;align-items:center;background:var(--dark2);border-radius:4px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;border-right:3px solid var(--morning);transition:.15s;user-select:none;}
.note-flag{cursor:pointer;font-size:12px;filter:saturate(1.4);}
.av-chip.ev{border-right-color:var(--evening);}
.av-chip.used{opacity:.35;cursor:default;text-decoration:line-through;}
.av-chip:not(.used):hover{background:var(--gold-dim);}
.av-chip:not(.used):active{transform:scale(.95);}

.sc{min-height:168px;border-radius:4px;border:2px dashed var(--border2);padding:3px;transition:.15s;display:flex;flex-direction:column;gap:2px;}
.sc.disabled{border-color:transparent;background:rgba(0,0,0,.2);pointer-events:none;}
.sc-chip{display:flex;align-items:center;background:var(--dark2);border-radius:4px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;border-right:3px solid var(--morning);transition:.15s;}
.sc-chip.ev{border-right-color:var(--evening);}
.sc-chip:hover{background:#3a3a3a;}
.add-btn{margin-top:auto;background:none;border:1px dashed var(--border2);border-radius:4px;padding:4px;color:var(--muted);font-size:10px;cursor:pointer;font-family:'Heebo',sans-serif;}
.add-btn:hover{border-color:var(--gold-border);color:var(--gold);}
.notes-inp{width:100%;background:transparent;border:none;color:var(--muted);font-size:10px;font-family:'Heebo',sans-serif;outline:none;padding:3px;}
.notes-inp::placeholder{color:var(--border2);}

.overlay{position:fixed;inset:0;z-index:200;display:none;}.overlay.on{display:block;}
.dd{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;min-width:180px;z-index:201;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.dd-search{width:100%;background:var(--black2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'Heebo',sans-serif;outline:none;margin-bottom:6px;}
.dd-item{padding:7px 10px;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:7px;transition:.15s;}
.dd-item:hover{background:var(--dark2);}
.dd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dd-sep{height:1px;background:var(--border);margin:3px 0;}
.dd-lbl{font-size:10px;color:var(--muted);padding:2px 10px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;overflow-y:auto;padding:16px;}
.modal-overlay.on{display:block;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:10px;max-width:860px;margin:0 auto;}
.modal-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;}
.modal-head h3{font-size:13px;font-weight:700;color:var(--gold);}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
.modal-body{padding:14px;overflow-x:auto;}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

.share-loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-size:14px;color:var(--gold);}
.share-loading.on{display:flex;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--gold-border);border-radius:8px;padding:10px 20px;font-size:13px;transition:.3s;z-index:400;color:var(--gold);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Hours */
.hours-select{background:var(--dark2);border:1px solid var(--border2);border-radius:4px;padding:5px 3px;color:#f0f0f0;font-size:12px;font-family:'Heebo',sans-serif;outline:none;width:52px;text-align:center;}
</style>
</head>
<body>

<header>
  <div class="logo"><h1>🌾 גרעיני עפולה חממה</h1><p>שיבוץ משמרות</p></div>
</header>

<div class="action-bar">
  <button class="abt" onclick="loadFromGitHub()">🔄 רענן</button>
  <button class="abt" onclick="clearFilled()">🗑️ נקה שיבוץ</button>
  <button class="abt" onclick="showPreview()">👁️ תצוגה מקדימה</button>
  <button class="abt gold" onclick="sendToGroup()">📲 שלח לקבוצה</button>
</div>

<div class="branch-bar" id="branchBar"></div>

<div class="info-bar">
  <div class="ii">סניף: <strong id="branchLbl">—</strong></div>
  <div class="ii">שבוע: <strong id="weekLbl">—</strong></div>
  <div class="deadline">⏰ הגשה עד חמישי 12:00</div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--morning)"></div>בוקר</div>
    <div class="li"><div class="ld" style="background:var(--evening)"></div>ערב</div>
    <div class="li">⚡ = כפולה</div>
  </div>
</div>

<div class="main">
  <div class="sec-box">
    <div class="sec-head"><h3>👥 זמינויות שהתקבלו</h3><span>לחץ + להכנסה למשמרת</span></div>
    <div class="tscroll" data-sync="1"><table id="availTable"></table></div>
  </div>
  <div class="sec-box">
    <div class="sec-head"><h3>📋 שיבוץ סופי</h3><span>לחץ − להסרה</span></div>
    <div class="tscroll" data-sync="1"><table id="filledTable"></table></div>
  </div>
  <div class="sec-box">
    <div class="sec-head"><h3>🕐 שעות פתיחה וסגירה</h3><span>נשמר אוטומטית</span></div>
    <div class="tscroll" data-sync="1"><table id="hoursTable"></table></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDD()"></div>
<div class="dd" id="ddMenu" style="display:none"></div>

<div class="modal-overlay" id="previewModal">
  <div class="modal">
    <div class="modal-head"><h3 id="previewTitle">תצוגה מקדימה</h3><button class="modal-close" onclick="closePreview()">×</button></div>
    <div class="modal-body" id="previewBody"></div>
    <div class="modal-footer">
      <button class="abt" onclick="closePreview()">סגור</button>
      <button class="abt gold" onclick="sendToGroup();closePreview()">📲 שלח לקבוצה</button>
    </div>
  </div>
</div>

<div class="share-loading" id="shareLoading"><div class="spinner"></div><div>מכין תמונה...</div></div>
<div class="toast" id="toast"></div>

<script>
const BRANCHES=['הרצליה סוקולוב 16','הרצליה סוקולוב 27','הרצליה צומת כדורי','גבעת שמואל','מודיעין מתחם שופרסל','מודיעין מתחם רמי לוי','מודיעין דם המכבים','פתח תקווה'];
const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי'];
const TL={בוקר:'בוקר',ערב:'ערב'};
const BOT_NUM='97297733273';


// State
let curBranch = BRANCHES[0];
let shifts = {}, avails = {}, hours = {};
let pending = null;

// Load from storage
try { shifts = JSON.parse(localStorage.getItem('garn_shifts') || '{}'); } catch(e) {}
try { avails = JSON.parse(localStorage.getItem('garn_avails') || '{}'); } catch(e) {}
try { hours  = JSON.parse(localStorage.getItem('garn_hours')  || '{}'); } catch(e) {}

// ── Week dates ──
function getWeekDates() {
  const now = new Date(), day = now.getDay();
  const sun = new Date(now);
  sun.setDate(now.getDate() + (day === 0 ? 7 : 7 - day));
  return DAYS.map((_, i) => {
    const d = new Date(sun);
    d.setDate(sun.getDate() + i);
    return d.getDate() + '.' + (d.getMonth() + 1);
  });
}

function updateLabels() {
  const dates = getWeekDates();
  document.getElementById('branchLbl').textContent = curBranch;
  document.getElementById('weekLbl').textContent = dates[0] + '—' + dates[5] + '.' + new Date().getFullYear();
}

// ── Branches ──
function initBranches() {
  const bar = document.getElementById('branchBar');
  BRANCHES.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'bb' + (b === curBranch ? ' active' : '');
    btn.textContent = b;
    btn.onclick = () => selectBranch(b);
    bar.appendChild(btn);
  });
}

function selectBranch(b) {
  curBranch = b;
  document.querySelectorAll('.bb').forEach(btn => btn.classList.toggle('active', btn.textContent === b));
  updateLabels();
  renderAll();
}

// ── Data helpers ──
function getCell(day, type) {
  if (!shifts[curBranch]) shifts[curBranch] = {};
  if (!shifts[curBranch][day]) shifts[curBranch][day] = { בוקר: [], ערב: [], notes: '' };
  return shifts[curBranch][day];
}

function saveLocal() {
  localStorage.setItem('garn_shifts', JSON.stringify(shifts));
}

// ── Sorted employees (by submission time) ──
function getSortedEmployees() {
  return Object.entries(avails)
    .filter(([, d]) => !d.branch || d.branch === curBranch)
    .sort((a, b) => {
      const ta = a[1].timestamp || '', tb = b[1].timestamp || '';
      return ta && tb ? ta.localeCompare(tb) : a[0].localeCompare(b[0], 'he');
    })
    .map(([name]) => name);
}

// ── Build table header ──
function buildHeader(dates) {
  let h = '<thead><colgroup><col style="width:72px"><col><col><col><col><col><col></colgroup><tr><th>משמרת</th>';
  DAYS.forEach((d, i) => {
    h += '<th><div class="th-day">יום ' + d + '</div><div class="th-date">' + dates[i] + '</div></th>';
  });
  return h + '</tr></thead>';
}

// ── Render all ──
function renderAll() {
  renderAvailTable();
  renderFilledTable();
  renderHoursTable();
}

// ── TABLE 1: Availability ──
function renderAvailTable() {
  const dates = getWeekDates();
  const names = getSortedEmployees();
  const t = document.getElementById('availTable');
  if (!names.length) {
    t.innerHTML = '<tbody><tr><td colspan="7" style="padding:20px;text-align:center;color:var(--muted)">טרם התקבלו זמינויות — לחץ 🔄 רענן</td></tr></tbody>';
    return;
  }
  let html = buildHeader(dates) + '<tbody>';
  ['בוקר', 'ערב'].forEach(type => {
    html += '<tr class="' + (type==='בוקר'?'row-m':'row-e') + '"><td>' + TL[type] + '</td>';
    DAYS.forEach((day, di) => {
      if (di === 5 && type === 'ערב') { html += '<td style="background:rgba(0,0,0,.2)"></td>'; return; }
      const assigned = (getCell(day, type)[type] || []);
      const chips = names.filter(n => {
        const t = avails[n] && avails[n].days && avails[n].days[day];
        return t === type || t === 'כפולה';
      }).map(n => {
        const isDouble = avails[n] && avails[n].days && avails[n].days[day] === 'כפולה';
        const used = assigned.includes(n);
        const note = (avails[n] && avails[n].notes && avails[n].notes[day]) ? avails[n].notes[day] : '';
        const noteEsc = note.replace(/"/g, '&quot;');
        const noteIcon = note ? ' <span class="note-flag" onclick="event.stopPropagation();showToast(\'📝 \'+decodeURIComponent(\'' + encodeURIComponent(note) + '\'))" title="' + noteEsc + '">📝</span>' : '';
        const cls = 'av-chip ' + (type === 'ערב' ? 'ev' : '') + (used ? ' used' : '');
        const click = used ? '' : ' onclick="tapAssign(\'' + n + '\',\'' + day + '\',\'' + type + '\')"';
        return '<div class="' + cls + '"' + (note ? ' title="📝 ' + noteEsc + '"' : '') + click + '>' + n + (isDouble ? ' ⚡' : '') + noteIcon + (used ? '' : ' +') + '</div>';
      }).join('');
      html += '<td><div class="av-cell">' + (chips || '<span style="font-size:9px;color:var(--border2)">—</span>') + '</div></td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';
  t.innerHTML = html;
}

// ── TABLE 2: Filled shifts ──
function renderFilledTable() {
  const dates = getWeekDates();
  const t = document.getElementById('filledTable');
  let html = buildHeader(dates) + '<tbody>';
  ['בוקר', 'ערב'].forEach(type => {
    html += '<tr class="' + (type==='בוקר'?'row-m':'row-e') + '"><td>' + TL[type] + '</td>';
    DAYS.forEach((day, di) => {
      if (di === 5 && type === 'ערב') { html += '<td><div class="sc disabled"></div></td>'; return; }
      const emps = (getCell(day, type)[type] || []);
      let sc = '<div class="sc' + (emps.length ? '' : '') + '">';
      emps.forEach((emp, ei) => {
        sc += '<div class="sc-chip ' + (type === 'ערב' ? 'ev' : '') + '" onclick="tapRemove(\'' + day + '\',\'' + type + '\',' + ei + ')">− ' + emp + '</div>';
      });
      sc += '<button class="add-btn" onclick="openDD(\'' + day + '\',\'' + type + '\',event)">+ הוסף</button>';
      sc += '</div>';
      html += '<td>' + sc + '</td>';
    });
    html += '</tr>';
  });
  // Notes row
  html += '<tr><td style="font-size:9px">הערות</td>';
  DAYS.forEach(day => {
    const n = (getCell(day, 'notes').notes || '').replace(/"/g, '&quot;');
    html += '<td><input class="notes-inp" placeholder="הערה..." value="' + n + '" onchange="setNote(\'' + day + '\',this.value)"></td>';
  });
  html += '</tr></tbody>';
  t.innerHTML = html;
}

function setNote(day, val) { getCell(day, 'notes').notes = val; }

// ── TABLE 3: Hours ──
function getHours(branch, day, type) {
  if (!hours[branch]) hours[branch] = {};
  if (!hours[branch][day]) hours[branch][day] = { open: '', close: '' };
  return hours[branch][day][type] || '';
}

function setHours(branch, day, type, part, val) {
  if (!hours[branch]) hours[branch] = {};
  if (!hours[branch][day]) hours[branch][day] = { open: '', close: '' };
  const cur = (hours[branch][day][type] || '00:00').split(':');
  if (part === 'h') cur[0] = String(val).padStart(2, '0');
  else cur[1] = String(val).padStart(2, '0');
  hours[branch][day][type] = cur.join(':');
  localStorage.setItem('garn_hours', JSON.stringify(hours));
}

function renderHoursTable() {
  const dates = getWeekDates();
  const t = document.getElementById('hoursTable');
  let html = '<thead><tr style="background:var(--black2)">';
  html += '<th style="text-align:right;padding:8px 10px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);width:80px">שעה</th>';
  DAYS.forEach((d, i) => {
    html += '<th style="padding:8px;text-align:center;border-bottom:1px solid var(--border);border-left:1px solid var(--border);">';
    html += '<div class="th-day">יום ' + d + '</div><div class="th-date">' + dates[i] + '</div></th>';
  });
  html += '</tr></thead><tbody>';

  [['open','🟢 פתיחה','var(--morning)',['07','08','09']],
   ['close','🔴 סגירה','var(--double)',['20','21','22','23']]].forEach(([type, label, color, opts]) => {
    html += '<tr><td style="padding:8px 10px;background:var(--black2);font-size:11px;font-weight:700;color:' + color + ';border-right:3px solid ' + color + ';border-bottom:1px solid var(--border)">' + label + '</td>';
    DAYS.forEach((day, di) => {
      const val = getHours(curBranch, day, type);
      const hh = val ? val.split(':')[0] : '';
      const mm = val ? val.split(':')[1] : '00';
      // ביום שישי שעות הסגירה שונות (14–18)
      const dayOpts = (type === 'close' && day === 'שישי') ? ['14','15','16','17','18'] : opts;
      let hSel = '<select class="hours-select" onchange="setHours(\'' + curBranch + '\',\'' + day + '\',\'' + type + '\',\'h\',this.value)">';
      hSel += '<option value="">--</option>';
      dayOpts.forEach(o => { hSel += '<option value="' + o + '"' + (hh === o ? ' selected' : '') + '>' + o + '</option>'; });
      hSel += '</select>';
      let mSel = '<select class="hours-select" onchange="setHours(\'' + curBranch + '\',\'' + day + '\',\'' + type + '\',\'m\',this.value)">';
      mSel += '<option value="00"' + (mm === '00' ? ' selected' : '') + '>00</option>';
      mSel += '<option value="30"' + (mm === '30' ? ' selected' : '') + '>30</option>';
      mSel += '</select>';
      html += '<td style="padding:4px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);text-align:center"><div style="display:flex;align-items:center;justify-content:center;gap:2px">' + mSel + '<span style="color:var(--gold);font-weight:700">:</span>' + hSel + '</div></td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';
  t.innerHTML = html;
}

// ── Tap actions ──
function tapAssign(name, day, type) {
  const cell = getCell(day, type);
  if (!cell[type].includes(name)) cell[type].push(name);
  saveLocal();
  renderAll();
}

function tapRemove(day, type, idx) {
  getCell(day, type)[type].splice(idx, 1);
  saveLocal();
  renderAll();
}

// ── Dropdown ──
function openDD(day, type, e) {
  e.stopPropagation();
  pending = { day, type };
  const avNames = getSortedEmployees().filter(n => {
    const t = avails[n] && avails[n].days && avails[n].days[day];
    return t === type || t === 'כפולה';
  });
  let html = '<input class="dd-search" id="ddS" placeholder="חפש שם..." oninput="filterDD()">';
  if (avNames.length) {
    html += '<div class="dd-lbl">זמינים</div>';
    avNames.forEach(n => html += '<div class="dd-item" onclick="addEmpDD(\'' + n + '\')"><div class="dd-dot" style="background:var(--morning)"></div>' + n + '</div>');
    html += '<div class="dd-sep"></div>';
  }
  html += '<div class="dd-item" onclick="addCustomDD()"><div class="dd-dot" style="background:var(--gold)"></div>➕ שם חדש...</div>';
  const menu = document.getElementById('ddMenu');
  menu.innerHTML = html;
  menu.style.display = 'block';
  const rect = e.target.getBoundingClientRect();
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.right = (window.innerWidth - rect.right) + 'px';
  menu.style.left = 'auto';
  document.getElementById('overlay').classList.add('on');
  setTimeout(() => document.getElementById('ddS') && document.getElementById('ddS').focus(), 50);
}

function filterDD() {
  const q = (document.getElementById('ddS') && document.getElementById('ddS').value || '').toLowerCase();
  document.querySelectorAll('.dd-item').forEach(el => el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none');
}

function addEmpDD(name) {
  if (!pending) return;
  tapAssign(name, pending.day, pending.type);
  closeDD();
}

function addCustomDD() {
  const name = prompt('שם העובד:');
  if (name && name.trim()) addEmpDD(name.trim());
  else closeDD();
}

function closeDD() {
  document.getElementById('ddMenu').style.display = 'none';
  document.getElementById('overlay').classList.remove('on');
  pending = null;
}

// ── Preview ──
function showPreview() {
  const dates = getWeekDates();
  document.getElementById('previewTitle').textContent = 'תצוגה מקדימה — ' + curBranch;
  const body = document.getElementById('previewBody');
  const S = 'border:1px solid #2e2e2e;';
  let html = '<table style="width:100%;border-collapse:collapse;min-width:600px;font-size:12px;font-family:Heebo,sans-serif;">';
  html += '<thead><tr style="background:#1a1a1a"><th style="padding:8px;text-align:right;color:#888;' + S + 'width:70px">משמרת</th>';
  DAYS.forEach((d, i) => html += '<th style="padding:8px;text-align:center;color:#f0f0f0;' + S + '">יום ' + d + '<br><span style="font-size:9px;color:#888">' + dates[i] + '</span></th>');
  html += '</tr></thead><tbody>';
  const colors = { בוקר: '#3d8ef0', ערב: '#9b59b6' };
  ['בוקר', 'ערב'].forEach(type => {
    html += '<tr><td style="padding:8px;background:#1a1a1a;font-weight:700;color:#888;border-right:3px solid ' + colors[type] + ';' + S + '">' + TL[type] + '</td>';
    DAYS.forEach((day, di) => {
      if (di === 5 && type === 'ערב') { html += '<td style="background:rgba(0,0,0,.3);' + S + '"></td>'; return; }
      const emps = (getCell(day, type)[type] || []);
      const names = emps.map(n => '<div style="background:#2a2a2a;border-radius:3px;padding:2px 6px;margin:1px 0;font-size:11px;border-right:2px solid ' + colors[type] + '">' + n + '</div>').join('');
      html += '<td style="padding:4px;vertical-align:top;height:168px;' + S + '">' + (names || '') + '</td>';
    });
    html += '</tr>';
  });
  // Hours
  [['open','🟢 פתיחה'],['close','🔴 סגירה']].forEach(([type, label]) => {
    html += '<tr><td style="padding:8px;background:#1a1a1a;font-size:10px;color:#888;' + S + '">' + label + '</td>';
    DAYS.forEach(day => {
      const v = getHours(curBranch, day, type) || '—';
      html += '<td style="padding:6px;font-size:11px;color:#c9a84c;text-align:center;' + S + '">' + v + '</td>';
    });
    html += '</tr>';
  });
  // Notes
  html += '<tr><td style="padding:8px;background:#1a1a1a;font-size:10px;color:#888;' + S + '">הערות</td>';
  DAYS.forEach(day => {
    html += '<td style="padding:6px;font-size:10px;color:#888;' + S + '">' + (getCell(day, 'notes').notes || '') + '</td>';
  });
  html += '</tr></tbody></table>';
  body.innerHTML = html;
  document.getElementById('previewModal').classList.add('on');
}

function closePreview() { document.getElementById('previewModal').classList.remove('on'); }

// ── Share to WhatsApp ──
// ── שלח סידור לקבוצה (כתמונה דרך הבוט) ──
function sendToGroup() {
  const data = {};
  DAYS.forEach(day => {
    const c = getCell(day, 'בוקר'); // מחזיר את אובייקט היום כולו
    const h = (hours[curBranch] && hours[curBranch][day]) || { open: '', close: '' };
    data[day] = { 'בוקר': c['בוקר'] || [], 'ערב': c['ערב'] || [], 'notes': c.notes || '', 'open': h.open || '', 'close': h.close || '' };
  });
  const msg = 'שלח לקבוצה|' + curBranch + '|' + JSON.stringify(data);
  window.open('https://wa.me/' + BOT_NUM + '?text=' + encodeURIComponent(msg), '_blank');
}

async function shareWA() {
  document.getElementById('shareLoading').classList.add('on');
  try {
    const dates = getWeekDates();
    const el = document.createElement('div');
    el.style.cssText = 'background:#111;padding:16px;font-family:Heebo,sans-serif;direction:rtl;width:750px;position:fixed;top:-9999px;';
    el.innerHTML = '<div style="margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #c9a84c"><div style="font-size:18px;font-weight:800;color:#c9a84c">🌾 גרעיני עפולה חממה</div><div style="font-size:13px;color:#888;margin-top:3px">שיבוץ משמרות — ' + curBranch + ' | שבוע ' + dates[0] + '—' + dates[5] + '.' + new Date().getFullYear() + '</div></div><div id="shareTableWrap"></div>';
    document.body.appendChild(el);
    const wrap = el.querySelector('#shareTableWrap');
    // Build simple table
    const colors = { בוקר: '#3d8ef0', ערב: '#9b59b6' };
    let tbl = '<table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr style="background:#1a1a1a"><th style="padding:8px;text-align:right;color:#888;border:1px solid #2e2e2e;width:60px">משמרת</th>';
    DAYS.forEach((d, i) => tbl += '<th style="padding:8px;text-align:center;color:#f0f0f0;border:1px solid #2e2e2e">יום ' + d + '<br><span style="font-size:9px;color:#888">' + dates[i] + '</span></th>');
    tbl += '</tr></thead><tbody>';
    ['בוקר', 'ערב'].forEach(type => {
      tbl += '<tr><td style="padding:8px;background:#1a1a1a;font-weight:700;color:' + colors[type] + ';border:1px solid #2e2e2e;border-right:3px solid ' + colors[type] + '">' + TL[type] + '</td>';
      DAYS.forEach((day, di) => {
        if (di === 5 && type === 'ערב') { tbl += '<td style="background:#0d0d0d;border:1px solid #2e2e2e"></td>'; return; }
        const emps = (getCell(day, type)[type] || []);
        const names = emps.map(n => '<div style="background:#2a2a2a;border-radius:3px;padding:3px 7px;margin:2px 0;color:#f0f0f0;font-size:11px;border-right:2px solid ' + colors[type] + '">' + n + '</div>').join('');
        tbl += '<td style="padding:4px;border:1px solid #2e2e2e;vertical-align:top;min-height:60px">' + names + '</td>';
      });
      tbl += '</tr>';
    });
    tbl += '</tbody></table>';
    wrap.innerHTML = tbl;
    const canvas = await html2canvas(el, { backgroundColor: '#111', scale: 2, useCORS: true });
    document.body.removeChild(el);
    canvas.toBlob(async blob => {
      document.getElementById('shareLoading').classList.remove('on');
      const file = new File([blob], 'שיבוץ.png', { type: 'image/png' });
      if (navigator.share) {
        try { await navigator.share({ files: [file], title: 'שיבוץ — ' + curBranch }); }
        catch(err) {
          if (err.name !== 'AbortError') {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'שיבוץ.png';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📥 הורד — שתף מהגלריה');
          }
        }
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'שיבוץ.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('📥 התמונה הורדה');
      }
    }, 'image/png');
  } catch(e) {
    document.getElementById('shareLoading').classList.remove('on');
    showToast('❌ שגיאה: ' + e.message);
  }
}

function clearFilled() {
  if (!confirm('למחוק שיבוץ של ' + curBranch + '?')) return;
  delete shifts[curBranch];
  saveLocal();
  renderAll();
  showToast('🗑️ נוקה');

// ── GitHub ──
async function loadFromGitHub() {
  showToast('⏳ טוען...');
  const API = 'https://api.github.com/repos/097733273iapp/hamamaorders/contents/';
  const HDR = { headers: { 'Accept': 'application/vnd.github.raw+json' } };
  try {
    const r1 = await fetch(API + 'availability.json?t=' + Date.now(), HDR);
    if (r1.ok) { const d = await r1.json(); Object.keys(avails).forEach(k=>delete avails[k]); Object.assign(avails, d); localStorage.setItem('garn_avails', JSON.stringify(avails)); }
    const r2 = await fetch(API + 'shifts.json?t=' + Date.now(), HDR);
    if (r2.ok) { const d = await r2.json(); Object.assign(shifts, d); localStorage.setItem('garn_shifts', JSON.stringify(shifts)); }
    renderAll();
    showToast('✅ עודכן');
  } catch(e) { showToast('ℹ️ ' + e.message); }
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── סנכרון גלילה אופקית בין הטבלאות ──
(function(){
  const panes = Array.from(document.querySelectorAll('.tscroll[data-sync="1"]'));
  let lock = false;
  panes.forEach(p => {
    p.addEventListener('scroll', () => {
      if (lock) return;
      lock = true;
      panes.forEach(o => { if (o !== p) o.scrollLeft = p.scrollLeft; });
      requestAnimationFrame(() => { lock = false; });
    });
  });
})();

loadFromGitHub();
