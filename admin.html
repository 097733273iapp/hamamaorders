<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול מוצרים — גרעיני עפולה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black:#111111; --black2:#1a1a1a; --card:#1e1e1e;
  --gold:#c9a84c; --gold2:#e8c96a;
  --gold-dim:rgba(201,168,76,0.15); --gold-border:rgba(201,168,76,0.35);
  --white:#ffffff; --text:#f0f0f0; --muted:#888; --border:#2e2e2e;
  --bg:#111111; --dark2:#2a2a2a; --border2:#3a3a3a; --gray:#888;
  --red:#e05555; --green:#4caf7d;
}
body { font-family:'Heebo','Segoe UI',sans-serif; background:var(--black); color:var(--text); min-height:100vh; }

/* ══ LOGIN ══ */
#login-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:32px 20px;
}
.login-logo { font-size:48px; margin-bottom:16px; }
.login-title { font-size:22px; font-weight:800; color:#fff; margin-bottom:4px; }
.login-sub { font-size:13px; color:var(--gold); margin-bottom:40px; letter-spacing:1px; }
.login-box {
  background:var(--card); border:1px solid var(--gold-border); border-radius:20px;
  padding:32px 28px; width:100%; max-width:360px;
}
.login-label { font-size:12px; color:var(--gold); font-weight:600; letter-spacing:0.5px; margin-bottom:8px; display:block; }
.login-input {
  width:100%; padding:13px 16px; background:var(--black); border:1.5px solid var(--border);
  border-radius:12px; color:#fff; font-size:16px; font-family:inherit; outline:none;
  transition:border-color 0.2s;
}
.login-input:focus { border-color:var(--gold); }
.login-btn {
  width:100%; margin-top:20px; padding:14px; background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none; border-radius:12px; color:#111; font-size:16px; font-weight:800;
  font-family:inherit; cursor:pointer; transition:opacity 0.2s;
}
.login-btn:active { opacity:0.85; }
.login-error { color:var(--red); font-size:13px; text-align:center; margin-top:12px; display:none; }

/* ══ MAIN APP ══ */
#app { display:none; flex-direction:column; min-height:100vh; }

/* ══ HEADER ══ */
header {
  background:#111; border-bottom:2px solid var(--gold);
  padding:10px 16px; display:flex; align-items:center; gap:14px;
  position:sticky; top:0; z-index:200; box-shadow:0 2px 12px rgba(0,0,0,0.5);
}
.header-icon { font-size:28px; }
.header-text h1 { font-size:17px; font-weight:800; color:#fff; line-height:1.2; }
.header-sub { font-size:11px; color:var(--gold); margin-top:2px; letter-spacing:0.5px; }
.header-actions { margin-right:auto; display:flex; gap:8px; align-items:center; }
.save-btn {
  background:linear-gradient(135deg,var(--gold),var(--gold2)); border:none; border-radius:10px;
  color:#111; font-size:13px; font-weight:800; font-family:inherit; cursor:pointer;
  padding:8px 18px; transition:opacity 0.2s; display:flex; align-items:center; gap:6px;
}
.save-btn:disabled { opacity:0.4; cursor:not-allowed; }
.save-btn:not(:disabled):active { opacity:0.8; }
.save-status { font-size:12px; color:var(--muted); }
.save-status.ok { color:var(--green); }
.save-status.err { color:var(--red); }

/* ══ TABS ══ */
.tabs-primary {
  background:var(--black2); border-bottom:1px solid var(--border);
  padding:0 12px; display:flex; gap:4px;
  position:sticky; top:57px; z-index:101;
}
.tab-primary {
  padding:12px 18px; background:none; border:none; color:var(--muted);
  font-family:inherit; font-size:14px; font-weight:700; cursor:pointer;
  border-bottom:3px solid transparent; white-space:nowrap; transition:color 0.2s,border-color 0.2s;
}
.tab-primary.active { color:var(--gold); border-bottom-color:var(--gold); }
.tab-primary:hover:not(.active) { color:var(--text); }

.tabs-secondary {
  background:#161616; border-bottom:1px solid var(--border);
  padding:0 12px; display:flex; gap:2px; overflow-x:auto;
  scrollbar-width:none; position:sticky; top:101px; z-index:100;
}
.tabs-secondary::-webkit-scrollbar { display:none; }
.tab-btn {
  padding:9px 13px; background:none; border:none; color:var(--muted);
  font-family:inherit; font-size:12px; font-weight:600; cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; transition:color 0.2s,border-color 0.2s;
  flex-shrink:0;
}
.tab-btn.active { color:var(--gold2); border-bottom-color:var(--gold2); }
.tab-btn:hover:not(.active) { color:var(--text); }

/* ══ CONTENT ══ */
.content { padding:16px; max-width:680px; margin:0 auto; width:100%; }

/* ══ SECTION ══ */
.section-panel { display:none; }
.section-panel.active { display:block; }
.section-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border);
}
.section-title { font-size:18px; font-weight:800; color:#fff; }
.section-count { font-size:12px; color:var(--muted); margin-top:2px; }
.add-btn {
  background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:10px;
  color:var(--gold); font-size:13px; font-weight:700; font-family:inherit; cursor:pointer;
  padding:8px 16px; display:flex; align-items:center; gap:6px; transition:background 0.2s;
}
.add-btn:hover { background:rgba(201,168,76,0.25); }

/* ══ ITEMS LIST ══ */
.items-list { display:flex; flex-direction:column; gap:0; }
.item-row {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--card); border:1px solid var(--border); border-radius:0;
  border-bottom:none; cursor:default; position:relative;
  transition:background 0.15s;
}
.item-row:first-child { border-radius:12px 12px 0 0; }
.item-row:last-child { border-radius:0 0 12px 12px; border-bottom:1px solid var(--border); }
.item-row:only-child { border-radius:12px; border-bottom:1px solid var(--border); }
.item-row.dragging {
  opacity:0.5; background:var(--dark2);
}
.item-row.drag-over {
  background:rgba(201,168,76,0.08); border-color:var(--gold-border);
}

.drag-handle {
  color:#444; font-size:18px; cursor:grab; flex-shrink:0; padding:2px 4px;
  line-height:1; user-select:none;
}
.drag-handle:active { cursor:grabbing; }
.item-num { font-size:11px; color:#444; width:22px; text-align:center; flex-shrink:0; font-weight:600; }
.item-name-display { flex:1; font-size:17px; color:#fff; font-weight:400; }
.item-name-input {
  flex:1; background:transparent; border:none; border-bottom:1.5px solid var(--gold);
  color:#fff; font-size:17px; font-family:inherit; outline:none; padding:2px 4px;
  display:none;
}
.item-actions { display:flex; gap:4px; flex-shrink:0; }
.action-btn {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--muted); font-size:14px; width:30px; height:30px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; flex-shrink:0;
}
.action-btn.edit-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.action-btn.move-btn:hover { border-color:#7ec8f7; color:#7ec8f7; background:rgba(126,200,247,0.1); }
.action-btn.save-item-btn { border-color:var(--green); color:var(--green); display:none; }
.action-btn.save-item-btn:hover { background:rgba(76,175,125,0.15); }
.action-btn.del-btn:hover { border-color:var(--red); color:var(--red); background:rgba(224,85,85,0.1); }
.item-row.editing .item-name-display { display:none; }
.item-row.editing .item-name-input { display:block; }
.item-row.editing .edit-btn { display:none; }
.item-row.editing .save-item-btn { display:flex; }

/* ══ ADD ROW ══ */
.add-row {
  display:flex; gap:10px; margin-top:10px; align-items:center;
}
.new-item-input {
  flex:1; padding:11px 14px; background:var(--card); border:1.5px solid var(--border);
  border-radius:10px; color:#fff; font-size:15px; font-family:inherit; outline:none;
  transition:border-color 0.2s;
}
.new-item-input:focus { border-color:var(--gold); }
.new-item-input::placeholder { color:#444; }
.confirm-add-btn {
  background:var(--gold-dim); border:1.5px solid var(--gold-border); border-radius:10px;
  color:var(--gold); font-size:20px; width:42px; height:42px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:background 0.2s;
}
.confirm-add-btn:hover { background:rgba(201,168,76,0.3); }

/* ══ EMPTY STATE ══ */
.empty-state {
  text-align:center; padding:40px 20px; color:var(--muted);
  border:1px dashed var(--border); border-radius:12px;
}
.empty-state .empty-icon { font-size:36px; margin-bottom:10px; }
.empty-state p { font-size:14px; }

/* ══ TOAST ══ */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:12px 24px; font-size:14px; font-weight:600; color:#fff;
  z-index:999; transition:transform 0.3s ease; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.6);
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { border-color:var(--green); color:var(--green); }
.toast.error { border-color:var(--red); color:var(--red); }

/* ══ MODAL ══ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:28px 24px; max-width:360px; width:100%;
}
.modal h3 { font-size:18px; font-weight:800; color:#fff; margin-bottom:8px; }
.modal p { font-size:14px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
.modal-btns { display:flex; gap:10px; }
.modal-cancel {
  flex:1; padding:12px; background:var(--dark2); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-size:15px; font-family:inherit; cursor:pointer;
}
.modal-confirm {
  flex:1; padding:12px; background:var(--red); border:none;
  border-radius:10px; color:#fff; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
}

/* ══ GITHUB CONFIG ══ */
.config-bar {
  background:var(--dark2); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; gap:10px;
}
.config-input {
  flex:1; padding:8px 12px; background:var(--black); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:12px; font-family:monospace; outline:none;
}
.config-input:focus { border-color:var(--gold); }
.config-label { font-size:11px; color:var(--muted); white-space:nowrap; }

.tabs-third {
  background:#141414; border-bottom:1px solid var(--border);
  padding:0 12px; display:flex; gap:2px; overflow-x:auto;
  scrollbar-width:none; position:sticky; top:139px; z-index:99;
}
.tabs-third::-webkit-scrollbar { display:none; }
.tab-btn-third {
  padding:7px 12px; background:none; border:none; color:#555;
  font-family:inherit; font-size:11px; font-weight:600; cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; transition:color 0.2s,border-color 0.2s;
  flex-shrink:0;
}
.tab-btn-third.active { color:#aaa; border-bottom-color:#aaa; }
.tab-btn-third:hover:not(.active) { color:var(--text); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">🌾</div>
  <div class="login-title">גרעיני עפולה חממה</div>
  <div class="login-sub">ממשק ניהול מוצרים</div>
  <div class="login-box">
    <label class="login-label">סיסמה</label>
    <input type="password" class="login-input" id="pwd-input" placeholder="הזן סיסמה..." autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">כניסה</button>
    <div class="login-error" id="login-error">סיסמה שגויה</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-icon">🌾</div>
    <div class="header-text">
      <h1>ניהול מוצרים</h1>
      <div class="header-sub">גרעיני עפולה חממה</div>
    </div>
    <div class="header-actions">
      <span class="save-status" id="save-status"></span>
      <button class="save-btn" id="save-btn" onclick="saveToGitHub()" disabled>
        💾 שמור GitHub
      </button>
    </div>
  </header>

  <!-- GitHub Token config -->
  <div class="config-bar">
    <span class="config-label">GitHub Token:</span>
    <input type="password" class="config-input" id="github-token" placeholder="ghp_..." value="">
    <span class="config-label" style="color:#444;font-size:10px;">נשמר בדפדפן</span>
  </div>

  <div class="tabs-primary" id="tabs-primary"></div>
  <div class="tabs-secondary" id="tabs-secondary"></div>

  <div class="content" id="content"></div>

  <footer>גרעיני עפולה חממה • ממשק ניהול מוצרים</footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">מחיקת מוצר</h3>
    <p id="modal-body"></p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">ביטול</button>
      <button class="modal-confirm" id="modal-confirm-btn">מחק</button>
    </div>
  </div>
</div>

<!-- MOVE MODAL -->
<div class="modal-overlay" id="move-modal">
  <div class="modal">
    <h3>↗ העבר מוצר</h3>
    <p id="move-modal-item-name" style="color:var(--gold);font-weight:700;margin-bottom:16px;font-size:15px;"></p>
    <p style="margin-bottom:10px;">בחר מחלקה יעד:</p>
    <select id="move-target-select" style="width:100%;padding:11px 14px;background:var(--black);border:1.5px solid var(--border);border-radius:10px;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:20px;">
    </select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="document.getElementById('move-modal').classList.remove('open')">ביטול</button>
      <button class="modal-confirm" style="background:var(--gold);color:#111;" onclick="confirmMove()">העבר ✓</button>
    </div>
  </div>
</div>



<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══ STATE ══
const GITHUB_REPO = '097733273iapp/hamamaorders';
const GITHUB_FILE = 'products.json';

let productsData  = null;
let isDirty       = false;
let dragSrc       = null;
let modalCallback = null;

// Navigation state
let currentGroup    = null; // 'רשת' | 'יבואנים' | 'ספקים'
let currentSupKey   = null; // supplier key (only for ספקים)
let currentCatKey   = null; // category key or null
// currentItemsPath = array describing how to reach the items array in productsData

// ══ LOGIN ══
function doLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === 'ilay2013') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    loadFromGitHub();
    const tok = localStorage.getItem('gh_token');
    if (tok) document.getElementById('github-token').value = tok;
    document.getElementById('github-token').addEventListener('input', e => {
      localStorage.setItem('gh_token', e.target.value);
    });
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ══ LOAD FROM GITHUB ══
async function loadFromGitHub() {
  showStatus('טוען...', '');
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/${GITHUB_FILE}?t=${Date.now()}`);
    if (!r.ok) throw new Error('failed');
    productsData = await r.json();
    buildPrimaryTabs();
    showStatus('', '');
    toast('המוצרים נטענו בהצלחה ✓', 'success');
  } catch(e) {
    showStatus('שגיאת טעינה', 'err');
    toast('שגיאה בטעינת המוצרים מ-GitHub', 'error');
  }
}

// ══ SAVE TO GITHUB ══
async function saveToGitHub() {
  const token = document.getElementById('github-token').value.trim();
  if (!token) { toast('הכנס GitHub Token', 'error'); return; }
  showStatus('שומר...', '');
  document.getElementById('save-btn').disabled = true;
  try {
    const metaR = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!metaR.ok) throw new Error('Cannot get file info');
    const meta = await metaR.json();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(productsData, null, 2))));
    const putR = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'עדכון מוצרים מממשק הניהול', content, sha: meta.sha })
    });
    if (!putR.ok) { const err = await putR.json(); throw new Error(err.message || 'save failed'); }
    isDirty = false;
    document.getElementById('save-btn').disabled = true;
    showStatus('נשמר ✓', 'ok');
    toast('המוצרים נשמרו ב-GitHub ✓', 'success');
    setTimeout(() => showStatus('', ''), 4000);
  } catch(e) {
    showStatus('שגיאת שמירה', 'err');
    toast('שגיאה: ' + e.message, 'error');
    document.getElementById('save-btn').disabled = false;
  }
}

function markDirty() {
  isDirty = true;
  document.getElementById('save-btn').disabled = false;
  showStatus('יש שינויים לא שמורים', '');
}

// ══ PRIMARY TABS (רשת / יבואנים / ספקים) ══
function buildPrimaryTabs() {
  const bar = document.getElementById('tabs-primary');
  bar.innerHTML = '';
  ['רשת','יבואנים','ספקים'].forEach((g, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-primary' + (i === 0 ? ' active' : '');
    btn.textContent = g;
    btn.onclick = () => switchGroup(g);
    bar.appendChild(btn);
  });
  switchGroup('רשת');
}

function switchGroup(g) {
  currentGroup  = g;
  currentSupKey = null;
  currentCatKey = null;
  document.querySelectorAll('.tab-primary').forEach(b => b.classList.toggle('active', b.textContent === g));

  if (g === 'רשת') {
    buildSecondaryTabs([
      { key:'legumes',   label:'קטניות' },
      { key:'granola',   label:'גרנולות' },
      { key:'nuts',      label:'פיצוחים' },
      { key:'store',     label:'קופה ונלוות' },
      { key:'equipment', label:'ציוד ואחר' },
    ], k => switchNetworkCat(k));
    switchNetworkCat('legumes');

  } else if (g === 'יבואנים') {
    buildSecondaryTabs([
      { key:'driedfruits', label:'פירות יבשים' },
      { key:'natural',     label:'טבעיים' },
    ], k => switchImporterCat(k));
    switchImporterCat('driedfruits');

  } else if (g === 'ספקים') {
    // שורה שניה = ספקים לפי א-ב
    const sups = Object.entries(productsData.suppliers)
      .sort((a,b) => a[1].title.localeCompare(b[1].title, 'he'));
    buildSecondaryTabs(sups.map(([k,v]) => ({ key:k, label:v.title })), k => switchSupplier(k));
    if (sups.length) switchSupplier(sups[0][0]);
  }
}

// ══ SECONDARY TABS ══
function buildSecondaryTabs(items, onClick) {
  const bar = document.getElementById('tabs-secondary');
  bar.innerHTML = '';
  items.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = item.label;
    btn.dataset.key = item.key;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onClick(item.key);
    };
    bar.appendChild(btn);
  });
}

// ══ THIRD-LEVEL TABS (ספקים בלבד) ══
function buildThirdTabs(cats, onClick) {
  let bar = document.getElementById('tabs-third');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'tabs-third';
    bar.className = 'tabs-third';
    document.getElementById('tabs-secondary').insertAdjacentElement('afterend', bar);
  }
  bar.innerHTML = '';
  cats.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn-third' + (i === 0 ? ' active' : '');
    btn.textContent = item.label;
    btn.dataset.key = item.key;
    btn.onclick = () => {
      bar.querySelectorAll('.tab-btn-third').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onClick(item.key);
    };
    bar.appendChild(btn);
  });
}

function removeThirdTabs() {
  const bar = document.getElementById('tabs-third');
  if (bar) bar.remove();
}

// ══ NETWORK / IMPORTERS ══
function switchNetworkCat(key) {
  currentCatKey = key;
  renderItemsList(['network', key], productsData.network[key].title);
}
function switchImporterCat(key) {
  currentCatKey = key;
  renderItemsList(['importers', key], productsData.importers[key].title);
}

// ══ SUPPLIERS ══
function switchSupplier(key) {
  currentSupKey = key;
  currentCatKey = null;
  const sup = productsData.suppliers[key];

  if (sup.categories) {
    // יש קטגוריות → שורה שלישית
    const cats = Object.entries(sup.categories)
      .sort((a,b) => a[0].localeCompare(b[0], 'he'))
      .map(([k,]) => ({ key:k, label:k }));
    buildThirdTabs(cats, catKey => switchSupplierCat(key, catKey));
    if (cats.length) switchSupplierCat(key, cats[0].key);
  } else {
    // ללא קטגוריות → הצג מוצרים ישירות
    removeThirdTabs();
    renderItemsList(['suppliers', key], sup.title);
  }
}

function switchSupplierCat(supKey, catKey) {
  currentSupKey = supKey;
  currentCatKey = catKey;
  const sup = productsData.suppliers[supKey];
  renderItemsList(['suppliers', supKey, catKey], `${sup.title} › ${catKey}`);
}

// ══ GET / SET ITEMS ══
function getItemsByPath(path) {
  let node = productsData;
  for (const k of path) node = node[k];
  // path מוביל ל-object עם items, או ישירות למערך (supplier.categories.cat)
  if (Array.isArray(node)) return node;
  return node.items;
}

function setItemsByPath(path, items) {
  let node = productsData;
  for (let i = 0; i < path.length - 1; i++) node = node[path[i]];
  const last = node[path[path.length - 1]];
  if (Array.isArray(last)) {
    node[path[path.length - 1]] = items;
  } else {
    last.items = items;
  }
}

let currentItemsPath = [];

function renderItemsList(path, title) {
  currentItemsPath = path;
  const items = getItemsByPath(path);
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-panel active">
      <div class="section-header">
        <div>
          <div class="section-title">${title}</div>
          <div class="section-count" id="item-count">${items.length} פריטים</div>
        </div>
      </div>
      <div class="items-list" id="items-list">
        ${items.length === 0 ? `
          <div class="empty-state"><div class="empty-icon">📭</div><p>אין מוצרים עדיין</p></div>
        ` : items.map((item, i) => renderItemRow(item, i)).join('')}
      </div>
      <div class="add-row">
        <input type="text" class="new-item-input" id="new-item-input" placeholder="שם מוצר חדש..." onkeydown="if(event.key==='Enter')confirmAdd()">
        <button class="confirm-add-btn" onclick="confirmAdd()" title="הוסף">+</button>
      </div>
    </div>
  `;
  setupDragDrop();
}

function renderItemRow(item, i) {
  return `
    <div class="item-row" draggable="true" data-index="${i}">
      <span class="drag-handle" title="גרור לסידור">⠿</span>
      <span class="item-num">${i + 1}</span>
      <span class="item-name-display">${item}</span>
      <input type="text" class="item-name-input" value="${item.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveItemEdit(this)">
      <div class="item-actions">
        <button class="action-btn edit-btn" onclick="startEdit(this)" title="עריכה">✏️</button>
        <button class="action-btn save-item-btn" onclick="saveItemEdit(this)" title="שמור שינוי">✓</button>
        <button class="action-btn del-btn" onclick="deleteItem(${i})" title="מחק">🗑</button>
      </div>
    </div>
  `;
}

// ══ EDIT ══
function startEdit(btn) {
  const row = btn.closest('.item-row');
  row.classList.add('editing');
  row.querySelector('.item-name-input').focus();
}

function saveItemEdit(el) {
  const row = el.closest('.item-row');
  const idx = parseInt(row.dataset.index);
  const newVal = row.querySelector('.item-name-input').value.trim();
  if (!newVal) return;
  const items = getItemsByPath(currentItemsPath);
  items[idx] = newVal;
  row.querySelector('.item-name-display').textContent = newVal;
  row.classList.remove('editing');
  markDirty();
  toast('מוצר עודכן', 'success');
}

// ══ DELETE ══
function deleteItem(idx) {
  const items = getItemsByPath(currentItemsPath);
  const name = items[idx];
  showModal('מחיקת מוצר', `למחוק את <strong style="color:#fff">"${name}"</strong>?`, () => {
    items.splice(idx, 1);
    markDirty();
    renderItemsList(currentItemsPath, document.querySelector('.section-title')?.textContent || '');
    toast('מוצר נמחק', 'success');
  });
}

// ══ ADD ══
function confirmAdd() {
  const input = document.getElementById('new-item-input');
  const val = input.value.trim();
  if (!val) { input.focus(); return; }
  const items = getItemsByPath(currentItemsPath);
  items.push(val);
  markDirty();
  renderItemsList(currentItemsPath, document.querySelector('.section-title')?.textContent || '');
  setTimeout(() => {
    const list = document.getElementById('items-list');
    if (list && list.lastElementChild) list.lastElementChild.scrollIntoView({ behavior:'smooth' });
  }, 50);
  toast('מוצר נוסף ✓', 'success');
}

// ══ DRAG & DROP ══
function setupDragDrop() {
  const list = document.getElementById('items-list');
  if (!list) return;
  list.querySelectorAll('.item-row[draggable]').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragSrc = row; row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', row.dataset.index);
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      list.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over'));
      if (row !== dragSrc) row.classList.add('drag-over');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== row) {
        const from = parseInt(dragSrc.dataset.index);
        const to   = parseInt(row.dataset.index);
        const items = getItemsByPath(currentItemsPath);
        const [moved] = items.splice(from, 1);
        items.splice(to, 0, moved);
        markDirty();
        renderItemsList(currentItemsPath, document.querySelector('.section-title')?.textContent || '');
        toast('סדר עודכן', 'success');
      }
    });
  });
}

// ══ MODAL ══
function showModal(title, body, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  modalCallback = onConfirm;
  document.getElementById('modal-confirm-btn').onclick = () => { closeModal(); if (modalCallback) modalCallback(); };
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ══ TOAST ══
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══ STATUS ══
function showStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg; el.className = 'save-status ' + cls;
}

</script>
</body>
